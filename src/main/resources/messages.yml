# TestPlugin Messages Configuration
# Uses MiniMessage format for modern text formatting
# Supports: <color>, <#HEXCOLOR>, <gradient>, <bold>, <italic>, <underlined>, <strikethrough>, <obfuscated>
# Also backward compatible with legacy & codes (&a, &c, etc.)
# Placeholders: {player}, {name}, {x}, {y}, {z}, {world}, {owner}, {command}
#
# Examples:
#   <red>Red text</red>
#   <#FF5555>Custom hex color</red>
#   <gradient:red:blue>Gradient text</gradient>
#   <bold><green>Bold green</green></bold>
#   <hover:show_text:'Click me!'><click:run_command:/help>Clickable</click></hover>

# General Messages
general:
  player-only: "<red>This command can only be run by a player.</red>"
  no-permission: "<red>You don't have permission to use this command.</red>"
  
# Permission-specific messages
permissions:
  no-basic: "<red>Error: You don't have permission to save locations.</red>"
  no-others: "<red>Error: You don't have permission to access other players' locations.</red>"

# Location storage messages
storage:
  saved: "<green>Coordinates saved as '<white>{name}</white>'.</green>"
  updated: "<green>Location '<white>{name}</white>' has been updated.</green>"
  deleted: "<green>Location '<white>{name}</white>' has been deleted.</green>"
  not-found: "<red>Error: Location '<white>{name}</white>' not found.</red>"
  player-not-found: "<red>Error: Player '<white>{player}</white>' not found or has no saved locations.</red>"
  invalid-name: "<red>Error: Location name must only contain letters, numbers, underscores, and hyphens.</red>"
  name-too-long: "<red>Error: Location name is too long. Maximum length is <yellow>{max}</yellow> characters.</red>"
  quota-exceeded: "<red>Error: You have reached the maximum limit of <yellow>{max}</yellow> saved locations (<yellow>{current}</yellow>/<yellow>{max}</yellow>). Delete an existing location before saving a new one.</red>"
  
# Teleport messages
teleport:
  success: "<green>Teleported to '<white>{name}</white>'.</green>"
  cross-player-success: "<green>Teleported to <white>{owner}</white>'s location '<white>{name}</white>'.</green>"
  failed: "<red>Teleportation failed. The world may not exist.</red>"
  
# List locations messages
list:
  header: "<gold>=== Saved Locations ===</gold>"
  own-header: "<gold>=== Your Saved Locations ===</gold>"
  other-header: "<gold>=== {player}'s Saved Locations ===</gold>"
  entry: "<yellow>- <white>{name}</white> <gray>({world}: {x}, {y}, {z})</gray></yellow>"
  empty: "<gray>No saved locations found.</gray>"
  
# Command usage messages
usage:
  goto: "<red>Usage: /goto <name> or /goto <player>:<name></red>"
  storeloc: "<red>Usage: /storeloc <name> <x> <y> <z></red>"
  setloc: "<red>Usage: /setloc <name> <x> <y> <z></red>"
  deleteloc: "<red>Usage: /deleteloc <name></red>"
  listlocs: "<red>Usage: /listlocs [player]</red>"
  
# Command interceptor messages
interceptor:
  parsed-command: "<gray>Parsed command: <aqua>{command}</aqua></gray>"
  
# Error messages
errors:
  invalid-coordinates: "<red>Error: Coordinates must be numeric values.</red>"
  location-different-world: "<red>Error: Location '<white>{name}</white>' is in world '<yellow>{saved_world}</yellow>', but you are in '<yellow>{current_world}</yellow>'. Cannot use cross-world coordinates.</red>"
  database-error: "<red>Error: Failed to save location. Please contact an administrator.</red>"
  
# Database messages (console only, not user-facing)
database:
  initialized: "SQLite database initialized successfully"
  migration-start: "Starting migration from YAML to SQLite..."
  migration-complete: "Successfully migrated all location data to SQLite!"
  migration-failed: "Migration failed: {error}"
  backup-created: "Created backup at: config.yml.backup"
