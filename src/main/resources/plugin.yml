name: TestPlugin
version: '1.0-SNAPSHOT'
main: com.ideflux.testPlugin.TestPlugin
api-version: '1.21'
authors: [ shaches ]
description: The World is a dangerous place
website: ideflux.com
commands:
  goto:
    description: Teleports to a saved location. Supports personal and cross-player access.
    usage: /goto <name> or /goto <player>:<name>
  storeloc:
    description: Stores a coordinate with a custom name. Names must be alphanumeric (letters, numbers, underscores, hyphens only).
    usage: /storeloc <name> <x> <y> <z>
  listlocs:
    description: Lists saved coordinates. Optional player argument to view another player's locations (read-only).
    usage: /listlocs [player]
  setloc:
    description: Overwrites an existing location you own. Cannot modify other players' locations.
    usage: /setloc <name> <x> <y> <z>
permissions:
  testplugin.basic:
    description: Allows saving and accessing personal locations.
    default: true
  testplugin.others:
    description: Allows reading and teleporting to other players' locations.
    default: op